component:
  type: uniformrandomtimer
  name: Uniform Random Timer
  description: "Pauses execution with random delay following uniform distribution. Each pause is equally likely to be any value between 0 and range. Total delay = constant delay + random(0 to range)."

properties:
  - name: ConstantTimer.delay
    type: String
    required: true
    default: "0"
    description: "Constant delay in milliseconds added to the random delay. Total pause = this value + random value. Example: 1000 means always add 1 second base delay."

  - name: RandomTimer.range
    type: Double
    required: true
    default: 100.0
    min: 0
    description: "Maximum random delay in milliseconds. Random value is uniformly distributed between 0 and this value. Example: range=500 adds random delay of 0-500ms."