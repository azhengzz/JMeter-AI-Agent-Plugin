component:
  type: jsonpathassertion
  testClass: org.apache.jmeter.assertions.JSONPathAssertion
  guiClass: org.apache.jmeter.assertions.gui.JSONPathAssertionGui
  name: JSON Path Assertion
  description: Validates JSON responses using JSONPath expressions

properties:
  - name: JSON_PATH
    type: String
    required: true
    description: JSONPath expression to extract value from JSON response (e.g., $.status, $.data.user.id, $..id)

  - name: EXPECTED_VALUE
    type: String
    required: false
    description: The expected value to compare against. Used when JSONVALIDATION is true. Can be literal value or regex pattern.

  - name: JSONVALIDATION
    type: Boolean
    required: false
    default: false
    description: Enable value validation. When true, validates the extracted value against EXPECTED_VALUE.

  - name: EXPECT_NULL
    type: Boolean
    required: false
    default: false
    description: When true, asserts that the JSONPath result is null.

  - name: INVERT
    type: Boolean
    required: false
    default: false
    description: Negate the assertion - causes assertion to fail if conditions are met, pass otherwise.

  - name: ISREGEX
    type: Boolean
    required: false
    default: true
    description: Treat EXPECTED_VALUE as a regular expression pattern for matching. 
