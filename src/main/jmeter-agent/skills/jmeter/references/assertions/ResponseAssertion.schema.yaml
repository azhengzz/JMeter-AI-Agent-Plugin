component:
  type: responseassertion
  name: Response Assertion
  description: Validates server responses against expected criteria

properties:
  - name: Assertion.scope
    type: String
    required: false
    enum: ["all", "children", "variable"]
    description: 

  - name: Scope.variable
    type: String
    required: false
    description: 

  - name: Assertion.test_field
    type: String
    required: true
    enum: ["Assertion.response_data", "Assertion.response_code", "Assertion.response_message", "Assertion.response_headers", "Assertion.request_headers", "Assertion.sample_label", "Assertion.response_data_as_document", "Assertion.request_data"]
    description: What to test (response code, data, headers, etc.)

  - name: Assertion.test_type
    type: Integer
    required: true
    min: 1
    max: 52
    description: Type of comparison (2=Contains, 1=Match, 8=Equals, 16=Substring, 4=Not, 32=Or, combinations with bitwise OR)

  - name: Assertion.test_strings
    type: Array
    itemType: String
    required: false
    description: Multiple patterns to match (collection of strings)

  - name: Assertion.assume_success
    type: Boolean
    required: false
    default: false
    description: Assume success status

  - name: Assertion.custom_message
    type: String
    required: false
    description: Custom failure message
