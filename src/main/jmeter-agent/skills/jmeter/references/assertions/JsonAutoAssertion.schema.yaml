component:
  type: jsonautoassertion
  name: JSON Auto Assertion
  description: Automatically compares JSON responses with expected JSON, supporting regex patterns in expected values

properties:
  - name: jsonStr
    type: String
    required: true
    description: Expected JSON string to compare against the response. Supports regex patterns in values using /pattern/g syntax.

  - name: extensible
    type: Boolean
    required: false
    default: true
    description: Allow extra fields in actual response that are not present in expected JSON

  - name: strictOrdering
    type: Boolean
    required: false
    default: false
    description: Enforce strict field ordering in JSON comparison
