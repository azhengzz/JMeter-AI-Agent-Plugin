component:
  type: parametertestfragmentcontroller
  testClass: com.gitee.qa.jmeter.control.ParameterTestFragmentController
  guiClass: com.gitee.qa.jmeter.control.gui.ParameterTestFragmentControllerGui
  name: Test Fragment (with Parameters)
  description: Enhanced Test Fragment that defines input parameters and return values for reusable parameterized test modules. Paired with ParameterIncludeController.

properties:
  - name: ParameterTestFragmentController.arguments
    type: Array
    testClass: org.apache.jmeter.config.Arguments
    mountMode: TestElementProperty
    containerAddMethod: addArgument
    required: false
    description: Input parameter definitions with name, default value, description, required, and notNull flags.
    itemClass: com.gitee.qa.jmeter.control.util.ParameterIncludeControllerArgument
    itemProperties:
      - name: Argument.name
        type: String
        required: true
        description: Parameter name

      - name: Argument.value
        type: String
        required: false
        description: Default value

      - name: Argument.desc
        type: String
        required: false
        setterOverride: setDescription
        description: Parameter description

      - name: ParameterIncludeControllerArgument.required
        type: Boolean
        required: false
        description: Whether this parameter must be provided by the Include Controller

      - name: ParameterIncludeControllerArgument.notNull
        type: Boolean
        required: false
        description: Whether the provided value must be non-empty

  - name: ParameterTestFragmentController.ReturnValueArguments
    type: Array
    testClass: org.apache.jmeter.config.Arguments
    mountMode: TestElementProperty
    containerAddMethod: addArgument
    required: false
    description: Return value definitions. Each item defines the variable name and description.
    itemClass: com.gitee.qa.jmeter.control.util.ParameterTestFragmentReturnValueArgument
    itemProperties:
      - name: Argument.name
        type: String
        required: true
        description: Output variable name

      - name: Argument.desc
        type: String
        required: false
        setterOverride: setDescription
        description: Description of the return value
