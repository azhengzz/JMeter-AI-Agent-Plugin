component:
  type: sshsftpsampler
  testClass: org.apache.jmeter.protocol.ssh.sampler.SSHSFTPSampler
  guiClass: org.apache.jmeter.testbeans.gui.TestBeanGUI
  name: SSH SFTP Sampler
  description: "Opens an SSH session to a remote host and performs a single SFTP operation via the sftp channel. Supports file transfer (get, put), file and directory management (rm, rmdir), and directory listing (ls). Supports password and public-key authentication. Useful for moving fixtures or verifying remote files as part of a load test."

properties:
  - name: hostname
    type: String
    required: true
    default: ""
    description: "SSH/SFTP server host name or IP address (e.g., '10.0.0.5', 'upload-host')."

  - name: port
    type: Integer
    required: false
    default: 22
    min: 1
    max: 65535
    description: "SSH server TCP port. Standard SSH listens on 22; some hosts run SSH on alternate ports (e.g., 2222)."

  - name: connectionTimeout
    type: Integer
    required: false
    default: 5000
    min: 0
    description: "SSH session connect timeout in milliseconds. The sampler fails the sample if the handshake does not complete within this time. Example: 10000 = 10 seconds."

  - name: username
    type: String
    required: true
    default: ""
    description: "SSH login user name (e.g., 'deploy', 'ci', 'reader')."

  - name: password
    type: String
    required: false
    default: ""
    description: "Password for password-based authentication. Ignored when sshkeyfile is set. Leave empty when using key-based authentication. Prefer referencing a JMeter variable (e.g., '${SSH_PASSWORD}') rather than hard-coding."

  - name: sshkeyfile
    type: String
    required: false
    default: ""
    description: "Absolute path to the local private key file used for public-key authentication. When non-empty, key-based authentication is used instead of password. Example: '/home/jmeter/.ssh/id_rsa'."

  - name: passphrase
    type: String
    required: false
    default: ""
    description: "Passphrase used to decrypt the private key, if the key is encrypted. Leave empty when the key has no passphrase. Prefer referencing a JMeter variable (e.g., '${KEY_PASSPHRASE}')."

  - name: action
    type: String
    required: true
    default: "get"
    enum: ["get", "put", "rm", "rmdir", "ls"]
    description: "SFTP operation to perform. 'get' downloads a remote file; 'put' uploads a local file; 'rm' deletes a remote file; 'rmdir' removes an empty remote directory; 'ls' lists a remote directory."

  - name: source
    type: String
    required: true
    default: ""
    description: "Source path for the SFTP operation. For get/rm/rmdir/ls, this is a remote path (absolute or relative to the remote user's home directory). For put, this is a local path on the JMeter host. Examples: '/var/log/app.log', './fixtures/users.csv'."

  - name: destination
    type: String
    required: false
    default: ""
    description: "Destination path. Required for put (remote target) and get when printFile is false (local target). Ignored for rm, rmdir, and ls. Examples: '/srv/inbox/users.csv', '${__property(user.dir)}/runtime/app.log'."

  - name: printFile
    type: Boolean
    required: false
    default: true
    description: "Only meaningful for the 'get' action. If true, the downloaded file's contents are written into the response body (suitable for small text files). If false, the file is saved to the local path given by destination instead. Leave true unless downloading large files."
