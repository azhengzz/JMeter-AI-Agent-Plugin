component:
  type: jsr223sampler
  name: JSR223 Sampler
  description: Allows you to execute custom code using JSR223 compliant scripting languages

properties:
  - name: scriptLanguage
    type: String
    required: true
    enum: ["groovy", "beanshell", "bsh", "java", "jexl", "jexl2"]
    default: "groovy"
    description: Scripting language

  - name: script
    type: String
    required: false
    description: Script code to execute (required if scriptFile is not set)

  - name: parameters
    type: String
    required: false
    description: Parameters to pass to script

  - name: cacheKey
    type: String
    required: false
    default: "true"
    enum: ["true", "false"]
    description: "Compile and cache the script for better performance. 'true'=enabled, 'false'=disabled."

  - name: filename
    type: String
    required: false
    default: ""
    description: "External script file path."