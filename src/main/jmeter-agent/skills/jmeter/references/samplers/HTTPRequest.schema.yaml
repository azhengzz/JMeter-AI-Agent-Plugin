component:
  type: httpsampler
  aliases: [httptestsample, httprequest]
  name: HTTP Request
  class: 
  description: Sends HTTP/HTTPS requests to web servers

properties:
  - name: HTTPSampler.protocol
    type: String
    required: false
    enum: ["http", "https", "file"]
    description: Protocol - http, https, or file

  - name: HTTPSampler.domain
    type: String
    required: false
    description: Domain name or IP address

  - name: HTTPSampler.port
    type: Integer
    required: false
    min: 1
    max: 65535
    description: Port number

  - name: HTTPSampler.path
    type: String
    required: false
    description: Resource path

  - name: HTTPSampler.method
    type: String
    required: false
    enum: ["GET", "POST", "PUT", "DELETE", "HEAD", "OPTIONS", "PATCH", "TRACE"]
    default: "GET"
    description: HTTP method

  - name: HTTPSampler.contentEncoding
    type: String
    required: false
    description: Content encoding for POST/PUT/PATCH

  - name: HTTPSampler.connect_timeout
    type: Integer
    required: false
    min: 0
    description: Connection timeout in milliseconds

  - name: HTTPSampler.response_timeout
    type: Integer
    required: false
    min: 0
    description: Response timeout in milliseconds

  - name: HTTPSampler.follow_redirects
    type: Boolean
    required: false
    default: true
    description: Follow redirects

  - name: HTTPSampler.auto_redirects
    type: Boolean
    required: false
    description: Auto-follow redirects at protocol level

  - name: HTTPSampler.use_keepalive
    type: Boolean
    required: false
    default: true
    description: Use keep-alive connections

  - name: HTTPSampler.DO_MULTIPART_POST
    type: Boolean
    required: false
    # default: false
    description: Use multipart/form-data for POST

  - name: HTTPSampler.postBodyRaw
    type: Boolean
    required: false
    default: false
    description: Send raw body content

  - name: HTTPsampler.Arguments
    type: Array
    class: org.apache.jmeter.config.Arguments
    required: false
    description: HTTP request arguments/parameters as an array of HTTPArgument objects.
    itemClass: org.apache.jmeter.protocol.http.util.HTTPArgument
    itemProperties:
      - name: Argument.name
        type: String
        required: false
        description: Parameter name. Required for parameter mode, omit for postBodyRaw mode.

      - name: Argument.value
        type: String
        required: true
        description: Parameter value

      - name: HTTPArgument.use_equals
        type: Boolean
        required: false
        default: true
        description: Whether to use '=' between name and value

      - name: HTTPArgument.always_encode
        type: Boolean
        required: false
        default: false
        description: Whether to always encode the parameter

      - name: Argument.metadata
        type: String
        required: false
        default: "="
        description: Metadata character (typically '=')

      - name: HTTPArgument.content_type
        type: String
        required: false
        default: "text/plain"
        description:

  - name: HTTPsampler.Files
    type: Array
    required: false
    description: File upload parameters for multipart/form-data requests
    itemClass: org.apache.jmeter.protocol.http.util.HTTPFileArg
    itemProperties:
      - name: File.path
        type: String
        required: true
        description: File path to upload

      - name: File.paramname
        type: String
        required: true
        description: HTTP parameter name for the file upload

      - name: File.mimetype
        type: String
        required: false
        default: "application/octet-stream"
        description: MIME type of the file
