component:
  type: httpsampler
  name: HTTP Request
  description: Sends HTTP/HTTPS requests to web servers

properties:
  - name: HTTPSampler.protocol
    type: String
    required: false
    enum: ["http", "https", "file"]
    description: Protocol - http, https, or file

  - name: HTTPSampler.domain
    type: String
    required: false
    description: Domain name or IP address

  - name: HTTPSampler.port
    type: Integer
    required: false
    min: 1
    max: 65535
    description: Port number

  - name: HTTPSampler.path
    type: String
    required: false
    description: Resource path

  - name: HTTPSampler.method
    type: String
    required: false
    enum: ["GET", "POST", "PUT", "DELETE", "HEAD", "OPTIONS", "PATCH", "TRACE"]
    default: "GET"
    description: HTTP method

  - name: HTTPSampler.contentEncoding
    type: String
    required: false
    description: Content encoding for POST/PUT/PATCH

  - name: HTTPSampler.connect_timeout
    type: Integer
    required: false
    min: 0
    description: Connection timeout in milliseconds

  - name: HTTPSampler.response_timeout
    type: Integer
    required: false
    min: 0
    description: Response timeout in milliseconds

  - name: HTTPSampler.follow_redirects
    type: Boolean
    required: false
    default: true
    description: Follow redirects

  - name: HTTPSampler.auto_redirects
    type: Boolean
    required: false
    description: Auto-follow redirects at protocol level

  - name: HTTPSampler.use_keepalive
    type: Boolean
    required: false
    default: true
    description: Use keep-alive connections

  - name: HTTPSampler.DO_MULTIPART_POST
    type: Boolean
    required: false
    # default: false
    description: Use multipart/form-data for POST

  - name: HTTPSampler.postBodyRaw
    type: Boolean
    required: false
    default: false
    description: Send raw body content

  - name: HTTPsampler.Arguments
    type: Object
    required: false
    description: HTTP request arguments/parameters
