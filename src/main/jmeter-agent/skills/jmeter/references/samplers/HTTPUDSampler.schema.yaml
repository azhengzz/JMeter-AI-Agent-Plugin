component:
  type: httpudsampler
  testClass: com.gitee.qa.jmeter.protocol.httpud.sampler.HTTPUDSampler
  guiClass: com.gitee.qa.jmeter.protocol.httpud.sampler.gui.HTTPUDSamplerGui
  name: HTTP User Defined Sampler
  description: Sends HTTP requests using a reusable configuration template defined by HTTP User Defined Element Configuration

properties:
  - name: HTTPUDSampler.variable_name
    type: String
    required: true
    description: Variable name that references an HTTP User Defined Element Configuration. Must match the identifier declared in the config element.

  - name: HTTPUDArgumentsGui.HTTPUDArguments
    type: Array
    testClass: org.apache.jmeter.config.Arguments
    mountMode: TestElementProperty
    containerAddMethod: addArgument
    required: false
    description: User-defined parameters to pass to the sampler, overriding defaults from the config element
    itemClass: com.gitee.qa.jmeter.protocol.httpud.util.HTTPUDArgument
    itemProperties:
      - name: Argument.name
        type: String
        required: true
        description: Parameter name (must match a parameter declared in the referenced HTTPUDConfigElement)

      - name: Argument.value
        type: String
        required: true
        description: Parameter value to use for this request

      - name: Argument.desc
        type: String
        required: true
        setterOverride: setDescription
        description: Parameter description (read-only, inherited from the referenced HTTP User Defined Element Configuration)

      - name: HTTPUDArgument.required
        type: Boolean
        required: true
        description: Whether the parameter is required (read-only, inherited from the referenced HTTP User Defined Element Configuration)
