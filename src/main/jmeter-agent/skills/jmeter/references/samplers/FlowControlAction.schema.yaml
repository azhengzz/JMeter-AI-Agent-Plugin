component:
  type: flowcontrolaction
  name: Flow Control Action
  description: "Controls test flow by pausing, stopping threads, or controlling loop iterations. Useful in conditional scenarios."

properties:
  - name: ActionProcessor.action
    type: Integer
    required: true
    default: 0
    enum: [0, 1, 2, 3, 4, 5]
    description: "Action to perform: 0=Stop, 1=Pause, 2=Stop Now, 3=Start Next Thread Loop, 4=Go To Next Iteration Of Current Loop, 5=Break Current Loop"

  - name: ActionProcessor.target
    type: Integer
    required: false
    default: 0
    enum: [0, 2]
    description: "Target for stop actions: 0=Current Thread, 2=All Threads (Test)"

  - name: ActionProcessor.duration
    type: String
    required: false
    default: ""
    description: "Pause duration in milliseconds (only used when action=Pause)."
