component:
  type: whilecontroller
  testClass: org.apache.jmeter.control.WhileController
  guiClass: org.apache.jmeter.control.gui.WhileControllerGui
  name: While Controller
  description: Executes its child elements repeatedly while a condition is true

properties:
  - name: WhileController.condition
    type: String
    required: false
    default: ""
    description: Condition to evaluate before each iteration (empty = check last sample)