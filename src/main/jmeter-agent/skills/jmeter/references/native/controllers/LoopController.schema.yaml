component:
  type: loopcontroller
  testClass: org.apache.jmeter.control.LoopController
  guiClass: org.apache.jmeter.control.gui.LoopControlPanel
  name: Loop Controller
  description: Controls the execution count of its child elements

properties:
  - name: LoopController.loops
    type: Integer
    required: true
    min: -1
    default: 1
    description: Number of iterations (-1 for infinite loop)

  - name: LoopController.continue_forever
    type: Boolean
    required: false
    default: false
    description: Loop infinitely
