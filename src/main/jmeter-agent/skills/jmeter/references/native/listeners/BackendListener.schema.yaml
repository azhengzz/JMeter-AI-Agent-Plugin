component:
  type: backendlistener
  name: Backend Listener
  description: Sends test results to external backends (Graphite, InfluxDB) for real-time monitoring and analysis
  testClass: org.apache.jmeter.visualizers.backend.BackendListener
  guiClass: org.apache.jmeter.visualizers.backend.BackendListenerGui

properties:
  # BackendListener core properties
  - name: classname
    type: String
    required: true
    enum: ["org.apache.jmeter.visualizers.backend.graphite.GraphiteBackendListenerClient", "org.apache.jmeter.visualizers.backend.influxdb.InfluxDBRawBackendListenerClient", "org.apache.jmeter.visualizers.backend.influxdb.InfluxdbBackendListenerClient", "com.gitee.qa.jmeter.visualizers.backend.influxdb.InfluxdbBackendListenerClient"]
    default: "com.gitee.qa.jmeter.visualizers.backend.influxdb.InfluxdbBackendListenerClient"
    description: Backend listener client class name. Enhanced version (com.gitee.qa.jmeter.visualizers.backend.influxdb.InfluxdbBackendListenerClient) provides detailed error tracking (responseCode, rawResponseCode, responseMessage, responseBody, requestHeader, sampleData), custom TAG_ parameters, regex filtering, and VictoriaMetrics compatibility

  - name: QUEUE_SIZE
    type: String
    required: false
    default: "5000"
    description: Queue size for batching samples before sending to backend

  # BackendListener.ARGUMENTS constant = "arguments" (BackendListener.java:84)
  - name: arguments
    type: Array
    required: true
    testClass: org.apache.jmeter.config.Arguments
    mountMode: TestElementProperty
    containerAddMethod: addArgument
    itemClass: org.apache.jmeter.config.Argument
    description: Backend-specific configuration parameters
    itemProperties:
      - name: Argument.name
        type: String
        required: false
        default: ""
        description: backend-specific parameters name

      - name: Argument.value
        type: String
        required: false
        default: ""
        description: backend-specific parameters value

      - name: Argument.metadata
        type: String
        required: false
        default: "="
        setterOverride: setMetaData
        description: metadata always is '='
