component:
  type: beanshellassertion
  testClass: org.apache.jmeter.assertions.BeanShellAssertion
  guiClass: org.apache.jmeter.assertions.gui.BeanShellAssertionGui
  name: BeanShell Assertion
  description: Executes BeanShell script to validate sampler results

properties:
  - name: BeanShellAssertion.query
    type: String
    required: true
    description: |
      The BeanShell script to run. The return value is ignored.
      Available variables: SampleResult/Response, ResponseData, ResponseCode, ResponseMessage,
      ResponseHeaders, RequestHeaders, SampleLabel, SamplerData, Successful.
      Set Failure=true to mark assertion as failed, and FailureMessage to specify the reason.

  - name: BeanShellAssertion.filename
    type: String
    required: false
    default: ""
    description: |
      Path to external script file. This overrides the script field.
      The filename is stored in the script variable FileName.

  - name: BeanShellAssertion.parameters
    type: String
    required: false
    default: ""
    description: |
      Parameters to pass to the BeanShell script. The parameters are stored in:
      - Parameters - string containing the parameters as a single variable
      - bsh.args - String array containing parameters, split on white-space

  - name: BeanShellAssertion.resetInterpreter
    type: Boolean
    required: false
    default: false
    description: |
      If true, the interpreter will be recreated for each sample.
      This may be necessary for some long-running scripts to avoid memory leaks.
