component:
  type: beanshellpreprocessor
  testClass: org.apache.jmeter.modifiers.BeanShellPreProcessor
  guiClass: org.apache.jmeter.testbeans.gui.TestBeanGUI
  name: BeanShell Pre-Processor
  description: "Executes BeanShell scripts before a sampler runs. Note: JSR223 with Groovy is recommended for better performance."

properties:
  - name: resetInterpreter
    type: Boolean
    required: false
    default: false
    description: "Reset the interpreter before each execution. Use with caution as it affects performance."

  - name: parameters
    type: String
    required: false
    default: ""
    description: "Parameters to pass to the script. Available as 'Parameters' string and 'bsh.args' array."

  - name: filename
    type: String
    required: false
    default: ""
    description: "External script file path. If set, script content from file will be used instead of inline script."

  - name: script
    type: String
    required: false
    default: ""
    description: "BeanShell script code to execute. Required if filename is not set."
