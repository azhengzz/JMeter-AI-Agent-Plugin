component:
  type: cookiemanager
  testClass: org.apache.jmeter.protocol.http.control.CookieManager
  guiClass: org.apache.jmeter.protocol.http.gui.CookiePanel
  name: Cookie Manager
  description: Automatically stores and sends cookies with HTTP requests

properties:
  - name: CookieManager.clearEachIteration
    type: Boolean
    required: false
    default: false
    description: Clear cookies at each iteration

  - name: CookieManager.policy
    type: String
    required: false
    enum: ["standard", "standard-strict", "ignoreCookies", "netscape", "default", "compatibility", "rfc2109", "rfc2965", "best-match"]
    default: "standard"
    description: Cookie policy specification

  - name: CookieManager.implementation
    type: String
    required: false
    default: "org.apache.jmeter.protocol.http.control.HC4CookieHandler"
    description: Cookie implementation class

  - name: CookieManager.controlledByThreadGroup
    type: Boolean
    required: false
    default: false
    description: Control by thread group

  - name: CookieManager.cookies
    type: Array
    testClass: org.apache.jmeter.protocol.http.control.CookieManager
    mountMode: self
    containerAddMethod: add
    required: false
    description: Cookie entries
    itemClass: org.apache.jmeter.protocol.http.control.Cookie
    itemProperties:
      - name: Cookie.name
        type: String
        required: true
        description: Cookie name

      - name: Cookie.value
        type: String
        required: true
        description: Cookie value

      - name: Cookie.domain
        type: String
        required: false
        description: Cookie domain

      - name: Cookie.path
        type: String
        required: false
        default: "/"
        description: Cookie path

      - name: Cookie.secure
        type: Boolean
        required: false
        default: false
        description: Whether cookie is secure (HTTPS only)

      - name: Cookie.expires
        type: Integer
        required: false
        default: 0
        description: Cookie expiration time (timestamp, 0 = session cookie)

      - name: Cookie.path_specified
        type: Boolean
        required: false
        default: true
        description: Whether path was explicitly specified

      - name: Cookie.domain_specified
        type: Boolean
        required: false
        default: true
        description: Whether domain was explicitly specified

