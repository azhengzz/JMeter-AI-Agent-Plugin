component:
  type: csvdataset
  testClass: org.apache.jmeter.config.CSVDataSet
  guiClass: org.apache.jmeter.testbeans.gui.TestBeanGUI
  name: CSV Data Set Config
  description: Reads data from CSV files and splits it into variables

properties:
  - name: filename
    type: String
    required: true
    default: ""
    description: Path to CSV file (relative or absolute)

  - name: fileEncoding
    type: String
    required: true
    default: "UTF-8"
    description: File encoding format

  - name: variableNames
    type: String
    required: true
    default: ""
    description: Comma-separated variable names

  - name: ignoreFirstLine
    type: Boolean
    required: true
    default: false
    description: Treat first line as header (skip it)

  - name: delimiter
    type: String
    required: true
    default: ","
    description: Field delimiter

  - name: quotedData
    type: Boolean
    required: true
    default: false
    description: Allow quoted data (with quotes)

  - name: recycle
    type: Boolean
    required: true
    default: true
    description: Rewind file when EOF is reached

  - name: stopThread
    type: Boolean
    required: true
    default: false
    description: Stop thread when EOF is reached (requires recycle=false)

  - name: shareMode
    type: String
    required: true
    enum: ["shareMode.all", "shareMode.group", "shareMode.thread"]
    default: "shareMode.all"
    description: Sharing mode between threads
