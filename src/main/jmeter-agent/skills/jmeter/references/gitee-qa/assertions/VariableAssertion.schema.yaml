component:
  type: variableassertion
  testClass: com.gitee.qa.jmeter.assertions.VariableAssertion
  guiClass: org.apache.jmeter.testbeans.gui.TestBeanGUI
  name: Variable Assertion
  description: Validates JMeter variables and properties against expected values

properties:
  - name: variablesCheckTable
    type: Array
    required: true
    description: Table of variable/property check rules
    itemClass: com.gitee.qa.jmeter.assertions.VariableExpectElement
    itemProperties:
      - name: variable
        type: String
        required: false
        default: ""
        description: JMeter variable name to check (leave empty to skip variable check)

      - name: property
        type: String
        required: false
        default: ""
        description: JMeter property name to check (leave empty to skip property check)

      - name: expect
        type: String
        required: true
        description: Expected value for the variable or property
