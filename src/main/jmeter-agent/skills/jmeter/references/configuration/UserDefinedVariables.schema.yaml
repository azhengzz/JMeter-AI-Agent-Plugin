component:
  type: userdefinedvariables
  name: User Defined Variables
  description: Defines static variables that can be referenced throughout the test plan

properties:
  - name: Arguments.arguments
    type: Array
    required: false
    description: List of variable name-value pairs
    class: org.apache.jmeter.config.Arguments
    itemClass: org.apache.jmeter.config.Argument
    itemProperties:
      - name: Argument.name
        type: String
        required: true
        default: ""
        description: Parameter name

      - name: Argument.value
        type: String
        required: true
        default: ""
        description: Parameter value

      - name: Argument.desc
        type: String
        required: true
        default: ""
        description: Parameter value

      - name: Argument.metadata
        type: String
        required: true
        default: "="
        description: Metadata character (typically '=')
