component:
  type: exceldataconfig
  name: Excel Data Set Config
  class: com.gitee.qa.jmeter.config.ExcelDataConfig
  description: Reads data from Excel files and splits it into variables

properties:

  - name: filename
    type: String
    required: true
    default: ""
    description: Path to Excel file (relative or absolute)

  - name: variableNames
    type: String
    required: false
    default: ""
    description: Comma-separated variable names. Leave empty to use the first row of the Excel file as column headers.

  - name: ignoreFirstLine
    type: Boolean
    required: false
    default: false
    description: Ignore first line of Excel file (only used if Variable Names is not empty)

  - name: recycle
    type: Boolean
    required: false
    default: true
    description: Rewind file when EOF is reached

  - name: stopThread
    type: Boolean
    required: false
    default: false
    description: Stop thread when EOF is reached (requires recycle=false)

  - name: shareMode
    type: String
    required: false
    enum: ["shareMode.all", "shareMode.group", "shareMode.thread"]
    default: "shareMode.all"
    description: Sharing mode between threads
