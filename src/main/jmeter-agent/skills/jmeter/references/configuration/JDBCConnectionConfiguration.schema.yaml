component:
  type: jdbcdatasource
  testClass: org.apache.jmeter.protocol.jdbc.config.DataSourceElement
  guiClass: org.apache.jmeter.testbeans.gui.TestBeanGUI
  name: JDBC Connection Configuration
  description: Configures JDBC database connection pool for JDBC Sampler

properties:
  - name: dataSource
    type: String
    required: true
    default: ""
    description: Variable name that holds the connection pool reference (used by JDBC Sampler)

  - name: poolMax
    type: String
    required: false
    default: "0"
    description: "Max pool size. 0 = one connection per thread (per-thread pooling), >0 = shared pool with that many connections"

  - name: timeout
    type: String
    required: false
    default: "10000"
    description: "Max wait time (ms) to get a connection from the pool"

  - name: trimInterval
    type: String
    required: false
    default: "60000"
    description: "Interval (ms) between idle connection eviction runs (requires keepAlive=true)"

  - name: autocommit
    type: Boolean
    required: false
    default: true
    description: Auto-commit mode for connections

  - name: transactionIsolation
    type: String
    required: false
    default: "DEFAULT"
    enum: ["DEFAULT", "TRANSACTION_NONE", "TRANSACTION_READ_UNCOMMITTED", "TRANSACTION_READ_COMMITTED", "TRANSACTION_REPEATABLE_READ", "TRANSACTION_SERIALIZABLE"]
    description: Transaction isolation level

  - name: preinit
    type: Boolean
    required: false
    default: false
    description: Initialize the connection pool at test start (eagerly create connections)

  - name: initQuery
    type: String
    required: false
    default: ""
    description: "SQL statements executed when a connection is created (one per line)"

  - name: keepAlive
    type: Boolean
    required: false
    default: true
    description: Enable keep-alive for idle connections

  - name: connectionAge
    type: String
    required: false
    default: "5000"
    description: "Max age (ms) of idle connections before eviction (requires keepAlive=true)"

  - name: checkQuery
    type: String
    required: false
    default: ""
    description: SQL query to validate idle connections (requires keepAlive=true)

  - name: dbUrl
    type: String
    required: true
    default: ""
    description: JDBC connection URL

  - name: driver
    type: String
    required: true
    default: ""
    enum: ["com.mysql.jdbc.Driver", "org.postgresql.Driver", "oracle.jdbc.OracleDriver", "com.ingres.jdbc.IngresDriver", "com.microsoft.sqlserver.jdbc.SQLServerDriver", "com.microsoft.jdbc.sqlserver.SQLServerDriver", "org.apache.derby.jdbc.ClientDriver", "org.hsqldb.jdbc.JDBCDriver", "com.ibm.db2.jcc.DB2Driver", "org.apache.derby.jdbc.ClientDriver", "org.h2.Driver", "org.firebirdsql.jdbc.FBDriver", "org.mariadb.jdbc.Driver", "org.sqlite.JDBC", "net.sourceforge.jtds.jdbc.Driver", "com.exasol.jdbc.EXADriver"]
    description: JDBC driver class name (select from dropdown or enter custom class)

  - name: username
    type: String
    required: false
    default: ""
    description: Database username

  - name: password
    type: String
    required: false
    default: ""
    description: Database password

  - name: connectionProperties
    type: String
    required: false
    default: ""
    description: "JDBC connection properties (key=value pairs separated by semicolons)"

  - name: poolPreparedStatements
    type: String
    required: false
    default: "-1"
    description: "Max pooled prepared statements. -1 = disabled, 0 = unlimited, >0 = specific limit"
