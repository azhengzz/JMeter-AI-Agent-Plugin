component:
  type: httpdefaults
  name: HTTP Request Defaults
  description: Sets default values for HTTP Request samplers

properties:
  - name: HTTPSampler.protocol
    type: String
    required: false
    enum: ["http", "https", "file"]
    description: Default protocol

  - name: HTTPSampler.domain
    type: String
    required: false
    description: Default domain name or IP address

  - name: HTTPSampler.port
    type: Integer
    required: false
    min: 1
    max: 65535
    description: Default port number

  - name: HTTPSampler.path
    type: String
    required: false
    description: Default path prefix

  - name: HTTPSampler.contentEncoding
    type: String
    required: false
    description: Default content encoding

  - name: HTTPSampler.connect_timeout
    type: Integer
    required: false
    min: 0
    description: Default connection timeout (milliseconds)

  - name: HTTPSampler.response_timeout
    type: Integer
    required: false
    min: 0
    description: Default response timeout (milliseconds)

  - name: HTTPSampler.postBodyRaw
    type: Boolean
    required: false
    default: false
    description: Send raw body content

  - name: HTTPsampler.Arguments
    type: Array
    class: org.apache.jmeter.config.Arguments
    mountMode: TestElementProperty
    containerAddMethod: addArgument
    required: false
    description: HTTP request arguments/parameters as an array of HTTPArgument objects.
    itemClass: org.apache.jmeter.protocol.http.util.HTTPArgument
    itemProperties:
      - name: Argument.name
        type: String
        required: true
        description: Parameter name

      - name: Argument.value
        type: String
        required: true
        description: Parameter value

      - name: HTTPArgument.use_equals
        type: Boolean
        required: false
        default: true
        description: Whether to use '=' between name and value

      - name: HTTPArgument.always_encode
        type: Boolean
        required: false
        default: false
        setterOverride: setAlwaysEncoded
        description: Whether to always encode the parameter

      - name: Argument.metadata
        type: String
        required: false
        default: "="
        setterOverride: setMetaData
        description: Metadata character (typically '=')

      - name: HTTPArgument.content_type
        type: String
        required: false
        default: "text/plain"
        description: Content type for this parameter
