component:
  type: headermanager
  name: Header Manager
  description: Allows you to add or override HTTP request headers

properties:
  - name: HeaderManager.headers
    type: Array
    class: org.apache.jmeter.protocol.http.control.HeaderManager
    mountMode: self
    containerAddMethod: add
    required: false
    description:
    itemClass: org.apache.jmeter.protocol.http.control.Header
    itemProperties:
      - name: Header.name
        type: String
        required: true
        description: 

      - name: Header.value
        type: String
        required: true
        description: 