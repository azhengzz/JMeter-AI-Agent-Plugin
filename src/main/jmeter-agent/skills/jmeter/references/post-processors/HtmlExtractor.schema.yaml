component:
  type: htmlextractor
  name: CSS Selector Extractor
  description: "Extracts data from HTML responses using CSS Selector or jQuery expressions. Supports JSOUP and JODD implementations."

properties:
  - name: Sample.scope
    type: String
    required: false
    enum: ["parent", "all", "children", "variable"]
    default: "parent"
    description: "Scope: parent=main sample only, all=main+sub-samples, children=sub-samples only, variable=JMeter variable"

  - name: Scope.variable
    type: String
    required: false
    description: "Extraction is to be applied to the contents of the named variable, (only used when scope=variable)"

  - name: HtmlExtractor.refname
    type: String
    required: true
    description: "Variable name for extracted value."

  - name: HtmlExtractor.expr
    type: String
    required: true
    description: "CSS Selector or jQuery expression to match elements."

  - name: HtmlExtractor.attribute
    type: String
    required: false
    default: ""
    description: "Attribute to extract from matched elements. Leave empty to extract text content."

  - name: HtmlExtractor.match_number
    type: String
    required: false
    default: "1"
    description: "Which match to use. 0=random, 1=first, >1=specific match, -1=all matches."

  - name: HtmlExtractor.default
    type: String
    required: false
    default: ""
    description: "Default value if no match found."

  - name: HtmlExtractor.default_empty_value
    type: Boolean
    required: false
    default: false
    description: "Set empty string as default value."

  - name: HtmlExtractor.extractor_impl
    type: String
    required: false
    enum: ["", "JSOUP", "JODD"]
    default: ""
    description: "Extractor implementation. Empty uses JSOUP (recommended). JODD is available for compatibility."
