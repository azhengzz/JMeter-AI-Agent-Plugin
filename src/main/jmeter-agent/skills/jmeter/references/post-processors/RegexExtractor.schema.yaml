component:
  type: regexextractor
  name: Regular Expression Extractor
  description: "Extracts data from server responses using regular expressions. Supports Java regex and ORO regex engines."

properties:
  - name: Sample.scope
    type: String
    required: false
    enum: ["parent", "all", "children", "variable"]
    default: "parent"
    description: "Scope: parent=main sample only, all=main+sub-samples, children=sub-samples only, variable=JMeter variable"

  - name: Scope.variable
    type: String
    required: false
    description: "Extraction is to be applied to the contents of the named variable, (only used when scope=variable)"

  - name: RegexExtractor.useHeaders
    type: String
    required: false
    enum: ["true", "false", "request_headers", "unescaped", "as_document", "URL", "code", "message"]
    default: "false"
    description: |
      Field to extract from:
      - "false": Body (response body content, excluding headers)
      - "unescaped": Body unescaped (HTML escape codes replaced)
      - "as_document": Body as a Document (extract text via Apache Tika)
      - "true": Response Headers
      - "request_headers": Request Headers
      - "URL": Request URL
      - "code": Response Code (e.g. 200)
      - "message": Response Message (e.g. OK)

  - name: RegexExtractor.refname
    type: String
    required: true
    description: |
      Variable name to store the result. Regex groups are also stored as:
      - refname_g0: entire match
      - refname_g1: first parenthesized group
      - refname_g2: second parenthesized group, etc.

  - name: RegexExtractor.regex
    type: String
    required: true
    description: |
      Regular expression pattern to match. Must contain parentheses () to capture groups.
      Example: "value=\"([^\"]*)\"" captures the value inside quotes.
      Do NOT wrap with slashes / / - use the pattern directly.

  - name: RegexExtractor.template
    type: String
    required: true
    default: "$1$"
    description: |
      Template to construct the result using captured groups.
      Use $1$ for group 1, $2$ for group 2, $0$ for entire match.
      Example: "token=$1$" produces "token=abc123" if group 1 matches "abc123".

  - name: RegexExtractor.match_number
    type: Integer
    required: false
    default: 1
    min: -1
    description: |
      Which match to use when regex matches multiple times:
      - 0: random match
      - 1: first match (default)
      - N: the Nth match
      - -1: all matches (creates variables refname_matchNr, refname_1, refname_2, etc.)

  - name: RegexExtractor.default
    type: String
    required: false
    default: ""
    description: |
      Default value if regex does not match. Useful for debugging - distinguishes between no match vs variable not set.
      Remove after debugging to keep variable unchanged when no match found.

  - name: RegexExtractor.default_empty_value
    type: Boolean
    required: false
    default: false
    description: |
      If checked and Default Value is empty, sets variable to empty string instead of not setting it.
      Use when extracted value is optional - ${refname} will be "" instead of "${refname}" if not found.
