component:
  type: jsr223preprocessor
  name: JSR223 Pre-Processor
  description: "Executes JSR223 scripts (Groovy, JavaScript, etc.) before a sampler runs. Groovy is recommended for best performance."

properties:
  - name: scriptLanguage
    type: String
    required: true
    enum: ["groovy", "beanshell", "bsh", "java", "jexl", "jexl2"]
    default: "groovy"
    description: "Scripting language engine to use. Groovy is strongly recommended."

  - name: parameters
    type: String
    required: false
    default: ""
    description: "Parameters to pass to the script. Available as 'Parameters' string and 'args' array."

  - name: filename
    type: String
    required: false
    default: ""
    description: "External script file path. If set, script content from file will be used instead of inline script."

  - name: cacheKey
    type: Boolean
    required: false
    default: true
    description: "Compile and cache the script for better performance. Disable only for dynamic scripts."

  - name: script
    type: String
    required: false
    default: ""
    description: "Script code to execute. Required if filename is not set."
