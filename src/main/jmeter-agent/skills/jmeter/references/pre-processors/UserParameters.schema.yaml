component:
  type: userparameters
  name: User Parameters
  description: "Define specific parameter values for different users (threads). Each user gets their own set of parameter values."

properties:
  - name: UserParameters.names
    type: Array
    required: true
    description: "List of parameter names. Each name becomes a variable that can be referenced as ${name}."

  - name: UserParameters.thread_values
    type: ARRAY_2D
    innerItemType: String
    required: true
    description: "List of user value lists. Each inner list contains values for one user, in the same order as names."

  - name: UserParameters.per_iteration
    type: Boolean
    required: false
    default: false
    description: "Update parameters each iteration instead of only once when the thread starts."
