component:
  type: perforautosteppingthreadgroup
  name: PerforAuto Stepping Thread Group
  class: kg.apc.jmeter.threads.PerforAutoSteppingThreadGroup
  description: Stepping thread group with performance automation tracking, scenario recording, and stop delay support

properties:

  - name: ThreadGroup.on_sample_error
    type: String
    required: false
    enum: ["continue", "startnextloop", "stopthread", "stoptest", "stoptestnow"]
    default: "continue"
    description: Behavior on sampler error

  - name: ThreadGroup.num_threads
    type: String
    required: true
    default: "100"
    description: Total number of virtual users (threads) to simulate

  - name: Threads initial delay
    type: String
    required: false
    default: "0"
    description: Initial delay in seconds before the first batch of threads starts

  - name: Start users count
    type: String
    required: false
    default: "0"
    description: Number of threads to start per step. If set to 0, defaults to total thread count

  - name: Start users count burst
    type: String
    required: false
    default: "0"
    description: Number of threads to start in the first (burst) batch. If set to 0 or less, defaults to Start users count

  - name: Start users period
    type: String
    required: false
    default: "30"
    description: Time interval in seconds between each thread-start step

  - name: Stop users count
    type: String
    required: false
    default: "0"
    description: Number of threads to stop per step. If set to 0, defaults to total thread count

  - name: Stop users period
    type: String
    required: false
    default: "0"
    description: Time interval in seconds between each thread-stop step

  - name: rampUp
    type: String
    required: false
    default: "0"
    description: Ramp-up time in seconds within each step

  - name: flighttime
    type: String
    required: false
    default: "30"
    description: Hold time in seconds after all threads have started and before ramp-down begins

  - name: AbstractPerforAutoSimpleThreadGroup.scenario
    type: String
    required: false
    enum: ["单交易基准", "单交易负载梯度", "混合容量梯度", "稳定性测试"]
    default: "单交易基准"
    description: Test scenario name for tracking and recording

  - name: AbstractPerforAutoSimpleThreadGroup.record_file_path
    type: String
    required: false
    default: ""
    description: File path to save test execution records

  - name: AbstractPerforAutoSimpleThreadGroup.stop_delay
    type: String
    required: false
    default: "0"
    description: Delay in seconds before stopping threads after test completion

  - name: AbstractPerforAutoSimpleThreadGroup.perfor_auto_args
    type: String
    required: false
    default: ""
    description: Extra arguments for performance automation record output

  - name: ThreadGroup.main_controller
    type: Object
    class: org.apache.jmeter.control.LoopController
    required: true
    description: Main controller (LoopController) for this thread group
    properties:
      - name: LoopController.loops
        type: String
        required: true
        default: "1"
        description: Number of loops (-1 for infinite)

      - name: LoopController.continue_forever
        type: Boolean
        required: false
        default: false
        description: Loop infinitely
