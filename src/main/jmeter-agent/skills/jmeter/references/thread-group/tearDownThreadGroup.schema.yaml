component:
  type: teardownthreadgroup
  name: tearDown Thread Group
  description: Runs after main thread groups for cleanup tasks

properties:
  - name: ThreadGroup.on_sample_error
    type: String
    required: false
    enum: ["continue", "startnextloop", "stopthread", "stoptest", "stoptestnow"]
    default: "continue"
    description: Behavior on sampler error

  - name: ThreadGroup.num_threads
    type: Integer
    required: true
    min: 1
    default: 1
    description: Number of virtual users to simulate

  - name: ThreadGroup.ramp_time
    type: Integer
    required: true
    min: 0
    default: 1
    description: Time (seconds) to start all threads

  - name: ThreadGroup.main_controller
    type: Object
    class: org.apache.jmeter.control.LoopController
    mountMode: TestElementProperty
    guiClass: org.apache.jmeter.control.gui.LoopControlPanel
    setterOverride: setSamplerController
    required: true
    description: Main controller (LoopController) for this thread group
    properties:
      - name: LoopController.loops
        type: Integer
        required: true
        min: -1
        default: 1
        description: Number of loops (-1 for infinite)

      - name: LoopController.continue_forever
        type: Boolean
        required: false
        default: false
        description: Loop infinitely

  - name: ThreadGroup.same_user_on_next_iteration
    type: Boolean
    required: true
    default: true
    description: Same user on each iteration

  - name: ThreadGroup.scheduler
    type: Boolean
    required: false
    default: false
    description: Enable scheduler for time-bound testing

  - name: ThreadGroup.duration
    type: Integer
    required: false
    min: 0
    description: Test duration in seconds (requires scheduler)

  - name: ThreadGroup.delay
    type: Integer
    required: false
    min: 0
    description: Startup delay in seconds (requires scheduler)