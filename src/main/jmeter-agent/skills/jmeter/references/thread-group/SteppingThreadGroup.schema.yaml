component:
  type: steppingthreadgroup
  name: Stepping Thread Group
  class: kg.apc.jmeter.threads.SteppingThreadGroup
  description: Gradually increases and decreases threads in steps, allowing precise control over load ramp-up and ramp-down patterns

properties:

  - name: ThreadGroup.num_threads
    type: String
    required: true
    default: "100"
    description: Total number of virtual users (threads) to simulate

  - name: Threads initial delay
    type: String
    required: false
    default: "0"
    description: Initial delay in seconds before the first batch of threads starts

  - name: Start users count
    type: String
    required: false
    default: "0"
    description: Number of threads to start per step. If set to 0, defaults to total thread count (all threads start at once)

  - name: Start users count burst
    type: String
    required: false
    default: "0"
    description: Number of threads to start in the first (burst) batch. If set to 0 or less, defaults to Start users count

  - name: Start users period
    type: String
    required: false
    default: "30"
    description: Time interval in seconds between each thread-start step

  - name: rampUp
    type: String
    required: false
    default: "0"
    description: Ramp-up time in seconds within each step. Threads within a step are evenly distributed across this time

  - name: flighttime
    type: String
    required: false
    default: "30"
    description: Hold time in seconds after all threads have started and before ramp-down begins

  - name: Stop users period
    type: String
    required: false
    default: "0"
    description: Time interval in seconds between each thread-stop step

  - name: Stop users count
    type: String
    required: false
    default: "0"
    description: Number of threads to stop per step. If set to 0, defaults to total thread count (all threads stop at once)

  - name: ThreadGroup.on_sample_error
    type: String
    required: false
    enum: ["continue", "startnextloop", "stopthread", "stoptest", "stoptestnow"]
    default: "continue"
    description: Behavior on sampler error

  - name: ThreadGroup.main_controller
    type: Object
    class: org.apache.jmeter.control.LoopController
    required: true
    description: Main controller (LoopController) for this thread group
    properties:
      - name: LoopController.loops
        type: String
        required: true
        min: -1
        default: "1"
        description: Number of loops (-1 for infinite)

      - name: LoopController.continue_forever
        type: Boolean
        required: false
        default: false
        description: Loop infinitely
