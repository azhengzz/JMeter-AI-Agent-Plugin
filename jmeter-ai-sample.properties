# Gitee Ai - JMeter AI Plugin Configuration

##### CHAT SETTINGS #####

### Gitee Ai supports Anthropic,OpenAI, Ollama APIs and Chinese LLM providers

# =====================================================
# GLOBAL LLM DEFAULTS
# =====================================================
# These defaults apply to ALL providers unless overridden per-provider.
# Per-provider overrides take precedence (e.g., deepseek.temperature=0.3).

# Global temperature (default: 0.7)
# Lower values = more deterministic, higher values = more creative
jmeter.ai.temperature=0.7

# Global max tokens per response (default: 4096)
jmeter.ai.max.tokens=65536

# Global max conversation history size for Agent Loop (default: 120)
# Controls the maximum number of messages replayed from session history per agent turn.
# Acts as a hard cap complementary to jmeter.ai.context.window.tokens (token-level trimming).
# Aligned with Nanobot's max_messages design (port from session.get_history).
# Set to 0 to disable message-count trimming (use token budget only).
jmeter.ai.max.history.size=120

# Global reasoning effort: none, minimal, low, medium, high, xhigh (default: medium)
# - none: no reasoning/thinking (faster, cheaper)
# - minimal: bare-minimum reasoning
# - low: light reasoning
# - medium: balanced reasoning
# - high: deep reasoning (slower, uses more tokens)
# - xhigh: maximum reasoning (slowest, most tokens)
# Maps to: Claude extended thinking budget, OpenAI reasoning_effort, Ollama ThinkMode
# Note: minimal/xhigh only take effect on providers whose API supports that level;
# other providers fall back to the nearest supported level (e.g. minimal -> low).
jmeter.ai.reasoning.effort=none

# Global default model (default: MiniMax-M2.7)
# All providers use this model unless explicitly overridden at runtime
jmeter.ai.default.model=MiniMax-M2.7

# Global default provider (default: minimax)
# Determines which provider to use for API calls
# Options: anthropic, openai, ollama, deepseek, zhipu, moonshot, minimax
jmeter.ai.default.provider=minimax

# Global context window size in tokens (default: 65536)
# Used by: ContextWindowManager, MemoryConsolidator, AgentRunner
jmeter.ai.context.window.tokens=102400

# Global max tool iterations per agent loop run (default: 50)
jmeter.ai.max.tool.iterations=50
# =====================================================

# =====================================================
# UNIFIED SYSTEM PROMPT (Applies to all AI providers)
# =====================================================
# This system prompt is used by ALL AI providers (Claude, OpenAI, DeepSeek, Zhipu, Moonshot, MiniMax, Ollama)
# Customize this to change how the AI assistant responds to your queries
#
# To use a custom prompt, uncomment and edit the lines below:
#jmeter.ai.system.prompt=You are a JMeter expert assistant. Help users with JMeter test plans.
# =====================================================


### Gitee Ai supports Anthropic,OpenAI, Ollama APIs only

# Ollama Configuration
# Enable/disable Ollama integration (default: true)
ollama.enabled=false

# Set to 'ollama' to use Ollama
ollama.host=http://localhost
ollama.port=11434
# Ollama thinking mode: ENABLED or DISABLED (default: DISABLED)
ollama.thinking.mode=DISABLED
# Ollama thinking level: LOW, MEDIUM, or HIGH (default: uses jmeter.ai.reasoning.effort)
# Only used when ollama.thinking.mode is ENABLED
#ollama.thinking.level=LOW
# Ollama request timeout in seconds (default: 120)
# Increase this value when using thinking mode, as inference takes longer
ollama.request.timeout.seconds=120

# Anthropic API Base URL (optional)
# Default: https://api.anthropic.com
# Uncomment to use a custom endpoint (e.g., for proxy or regional deployment)
#anthropic.api.base.url=https://api.anthropic.com

# Anthropic API Key (required)
anthropic.api.key=YOUR_API_KEY

# Anthropic API Logging Level
# Set to "info" for basic request/response logging or "debug" for verbose logging
# Leave empty to disable logging
anthropic.log.level=

# OpenAI API Base URL (optional)
# Default: https://api.openai.com
# Uncomment to use a custom endpoint (e.g., for proxy or Azure OpenAI)
#openai.api.base.url=https://api.openai.com

# OpenAI API Key (required)
openai.api.key=YOUR_API_KEY
openai.log.level=

