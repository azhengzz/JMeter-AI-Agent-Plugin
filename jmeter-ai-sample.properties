# Feather Wand - JMeter AI Plugin Configuration

##### AI Terminal Settings #####
jmeter.ai.terminal.claudecode.enabled=true
# Full path containing the claude executable
# Windows example: C:\Users\YOUR_USER_NAME\.local\bin\claude
# Linux/macOS example: /usr/local/bin/claude
jmeter.ai.terminal.claudecode.path=

# If you would like to change the prompt, please do; however it is not recommended
jmeter.ai.terminal.claudecode.prompt=You are an AI assistant integrated into Apache JMeter via the FeatherWand plugin. \
You have access to the current JMeter test plan structure. \
Help the user with performance testing tasks including: \
Analyzing and optimizing JMeter test plans \
- Creating new test elements (Thread Groups, Samplers, Assertions, etc.) \
- Debugging test plan issues \
- Performance testing best practices \
- JMeter scripting and configuration \
- Write, debug, and test Java code \
- Write, debug, and test Groovy script


##### CHAT SETTINGS #####

### Feather Wand supports Anthropic,OpenAI, Ollama APIs and Chinese LLM providers

# =====================================================
# UNIFIED SYSTEM PROMPT (Applies to all AI providers)
# =====================================================
# This system prompt is used by ALL AI providers (Claude, OpenAI, DeepSeek, Zhipu, Moonshot, MiniMax, Ollama)
# Customize this to change how the AI assistant responds to your queries
#
# To use a custom prompt, uncomment and edit the lines below:
#jmeter.ai.system.prompt=You are a JMeter expert assistant. Help users with JMeter test plans.
# =====================================================


### Feather Wand supports Anthropic,OpenAI, Ollama APIs only

# Ollama Configuration
# Enable/disable Ollama integration (default: true)
ollama.enabled=false

# Set to 'ollama' to use Ollama
# You must set the right model name for the AI service you choose
# Please refer to the documentation of the AI service you choose to find the right model name
ollama.default.model=llama3.1
ollama.host=http://localhost
ollama.port=11434
ollama.temperature=0.5
ollama.max.history.size=10
# Ollama thinking mode: ENABLED or DISABLED (default: DISABLED)
ollama.thinking.mode=DISABLED
# Ollama thinking level: LOW, MEDIUM, or HIGH (default: MEDIUM)
# Only used when ollama.thinking.mode is ENABLED
ollama.thinking.level=LOW
# Ollama request timeout in seconds (default: 120)
# Increase this value when using thinking mode, as inference takes longer
ollama.request.timeout.seconds=120

# AI Refactoring Configuration
# Set to true to enable AI Refactoring
# This setting is separated from the Feather Wand chat assistant configuration
jmeter.ai.refactoring.enabled=true

# Set to 'anthropic' to use Anthropic, or 'openai' to use OpenAI
# Default is Anthropic
# You must set the right model name for the AI service you choose
# Please refer to the documentation of the AI service you choose to find the right model name
jmeter.ai.service.type=anthropic
anthropic.default.model=claude-3-7-sonnet-20250219

# If you want to use OpenAI instead of Anthropic, uncomment the following properties
#jmeter.ai.service.type=openai
#openai.default.model=gpt-4o

# Anthropic API Base URL (optional)
# Default: https://api.anthropic.com
# Uncomment to use a custom endpoint (e.g., for proxy or regional deployment)
#anthropic.api.base.url=https://api.anthropic.com

# Anthropic API Key (required)
anthropic.api.key=YOUR_API_KEY_HERE

# Claude Model Selection
# By default Feather Wand excludes non-Chat models such as audio, tts, transcribe, search, etc.
# If your selected model did not work, please choose the Chat model from the drop down.
# Enter a valid model name e.g. claude-3-7-sonnet-20250219, if invalid or empty, Feather Wand will choose the first available model
claude.default.model=claude-3-7-sonnet-20250219

# Claude Temperature (0.0 to 1.0)
# Lower values make responses more deterministic, higher values more creative
claude.temperature=0.5

# Maximum conversation history size
claude.max.history.size=10

# Anthropic API Logging Level
# Set to "info" for basic request/response logging or "debug" for verbose logging
# Leave empty to disable logging
anthropic.log.level=

# OpenAI API Base URL (optional)
# Default: https://api.openai.com
# Uncomment to use a custom endpoint (e.g., for proxy or Azure OpenAI)
#openai.api.base.url=https://api.openai.com

# OpenAI API Key (required)
openai.api.key=YOUR_OPENAI_API_KEY

# By default Feather Wand excludes non-Chat models such as audio, tts, transcribe, search, etc.
# If your selected model did not work, please choose the Chat model from the drop down.
openai.default.model=gpt-4o
openai.temperature=0.5
openai.max.tokens=1024
openai.max.history.size=10
openai.log.level=

##### CHINESE LLM PROVIDER CONFIGURATION #####

# =====================================================
# Feather Wand now supports Chinese LLM providers
# Supported providers: DeepSeek, Zhipu AI (GLM), Moonshot (Kimi), MiniMax
# =====================================================

# -----------------------------------------------------
# DeepSeek Configuration
# -----------------------------------------------------
# API Key (required) - Get your key from https://platform.deepseek.com
deepseek.api.key=

# API Base URL (optional)
# Default: https://api.deepseek.com
# Uncomment to use a custom endpoint
#deepseek.api.base.url=https://api.deepseek.com

# Available Models (comma-separated list)
# Only models listed here will appear in the model selector
# Leave empty to use default models
deepseek.models=deepseek-chat,deepseek-coder

# Default Model
deepseek.default.model=deepseek-chat

# Temperature (0.0 to 1.0, default: 0.7)
deepseek.temperature=0.7

# Maximum tokens per response (default: 4096)
deepseek.max.tokens=4096

# Maximum conversation history size (default: 10)
deepseek.max.history.size=10

# -----------------------------------------------------
# Zhipu AI (GLM) Configuration
# -----------------------------------------------------
# API Key (required) - Get your key from https://open.bigmodel.cn
zhipu.api.key=

# API Base URL (optional)
# Default: https://open.bigmodel.cn/api/paas/v4
#zhipu.api.base.url=https://open.bigmodel.cn/api/paas/v4

# Available Models (comma-separated list)
zhipu.models=glm-4-plus,glm-4-0520,glm-4-air,glm-4-flash,glm-4-long,glm-3-turbo

# Default Model
zhipu.default.model=glm-4-plus

# Temperature (0.0 to 1.0, default: 0.7)
zhipu.temperature=0.7

# Maximum tokens per response (default: 4096)
zhipu.max.tokens=4096

# Maximum conversation history size (default: 10)
zhipu.max.history.size=10

# -----------------------------------------------------
# Moonshot (Kimi) Configuration
# -----------------------------------------------------
# API Key (required) - Get your key from https://platform.moonshot.cn
moonshot.api.key=

# API Base URL (optional)
# Default: https://api.moonshot.ai/v1
#moonshot.api.base.url=https://api.moonshot.ai/v1

# Available Models (comma-separated list)
moonshot.models=kimi-latest,kimi-k2.5,moonshot-v1-8k,moonshot-v1-32k,moonshot-v1-128k

# Default Model
moonshot.default.model=kimi-latest

# Temperature (0.0 to 1.0, default: 1.0 for Kimi k2.5)
# Note: Kimi k2.5 requires temperature >= 1.0
moonshot.temperature=1.0

# Maximum tokens per response (default: 4096)
moonshot.max.tokens=4096

# Maximum conversation history size (default: 10)
moonshot.max.history.size=10

# -----------------------------------------------------
# MiniMax Configuration
# -----------------------------------------------------
# API Key (required) - Get your key from https://api.minimax.com
minimax.api.key=

# API Base URL (optional)
# Default: https://api.minimax.io/v1
#minimax.api.base.url=https://api.minimax.io/v1

# Available Models (comma-separated list)
minimax.models=abab6.5s-chat,abab6.5-chat,abab5.5-chat

# Default Model
minimax.default.model=abab6.5s-chat

# Temperature (0.0 to 1.0, default: 0.7)
minimax.temperature=0.7

# Maximum tokens per response (default: 4096)
minimax.max.tokens=4096

# Maximum conversation history size (default: 10)
minimax.max.history.size=10

##### AGENT LOOP CONFIGURATION #####

# Enable/disable the Agent Loop architecture
# When enabled, provides tool calling, memory management, and session persistence
agent.enabled=true

# Agent Loop Iteration Settings
# Maximum number of tool call iterations per message (default: 40)
agent.max.iterations=40

# Context Window Management
# Context window size in tokens (default: 60000)
agent.context.window.tokens=60000

# Tool Result Truncation
# Maximum characters for tool results before truncation (default:16000)
agent.tool.result.max.chars=16000


##### WORKSPACE CONFIGURATION #####

# Workspace Path for Agent Loop
# Location for MEMORY.md, HISTORY.md, session files, skills, and bootstrap templates
# This workspace is used by: MemoryStore, SessionManager, SkillsLoader, ContextBuilder
# Default: C:\Users\{user.home}\.jmeter-ai\agent
agent.workspace.path=${user.home}/.jmeter-ai/agent


##### MEMORY CONFIGURATION #####

# Enable/disable memory system
# When enabled, stores long-term memory and conversation history
agent.memory.enabled=true

# Memory Consolidation Settings
# Threshold (0.0-1.0) of context window before triggering memory consolidation (default: 0.5)
agent.memory.consolidation.threshold=0.5


##### SESSION CONFIGURATION #####

# Session Timeout
# Time in milliseconds before an inactive session expires (default: 3600000 = 1 hour)
agent.session.timeout=3600000

# Maximum Sessions
# Maximum number of active sessions to maintain (default: 100)
agent.session.max.sessions=100


##### TOOL CONFIGURATION #####

# JMeter Tools
# Enable/disable JMeter-specific tools (get_element, optimize_element, etc.)
agent.tools.jmeter.enabled=true

# File System Tools
# Enable/disable file system tools (read_file, write_file, etc.)
# WARNING: Use with caution - may pose security risks
agent.tools.filesystem.enabled=true

# Allowed directories for file system tools (comma-separated)
# If empty, defaults to user home and current working directory
# Example: C:\\Projects,D:\\Work
agent.tools.filesystem.allowed.dirs=D:\\tmp

# Web Search Tools
# Enable/disable web search tools (web_search, web_fetch)
# Requires API keys for search services
agent.tools.websearch.enabled=true

# Web Search Provider (default: brave)
# Options: brave, tavily, duckduckgo, jina, serpapi
agent.tools.websearch.provider=brave

# Maximum search results (default: 10)
agent.tools.websearch.max.results=10

# Search timeout in seconds (default: 30)
agent.tools.websearch.timeout=30

# Web Fetch Settings
# Maximum content length in characters (default: 50000)
agent.tools.webfetch.max.length=50000

# Fetch timeout in seconds (default: 30)
agent.tools.webfetch.timeout=30

# SSRF Protection
# Enable/disable SSRF (Server-Side Request Forgery) protection
# When enabled, blocks access to private/local networks
agent.tools.web.ssrf.protection=true

# Maximum redirects to follow (default: 5)
agent.tools.web.max.redirects=5

# Tool timeout in milliseconds (default: 30000)
agent.tools.timeout.ms=30000


##### CHAT UI CONFIGURATION #####

# Show Tool Calls in Chat
# Enable/disable display of tool call information in the chat panel (default: true)
# When enabled, shows tool name, status, execution time, and result for each tool call
ai.chat.show.tool.calls=true

# Tool Result Display Max Length
# Maximum characters to display for tool results (default: 500)
# This setting is shared between:
# - Chat UI display: tool arguments and results in the chat panel
# - Internal logging: tool results stored in ToolEvent for logging
# Content longer than this will be truncated with "..." and total length indicator
ai.chat.tool.result.max.length=500


# API Keys for Search Services
# Tavily API Key (optional - https://tavily.com)
agent.tools.websearch.tavily.api.key=

# SerpAPI Key (optional - https://serpapi.com)
agent.tools.websearch.serpapi.key=

# Jina API Key (optional - https://jina.ai)
agent.tools.websearch.jina.api.key=


##### LANGSMITH TRACING CONFIGURATION #####

# Enable/disable LangSmith tracing
# LangSmith provides LLM call tracing, monitoring, and evaluation
# Get your API key from https://smith.langchain.com
langsmith.enabled=true

# LangSmith API Key (required for tracing)
# Get your key from https://smith.langchain.com/settings
langsmith.api.key=

# Project Name (default: jmeter-ai)
# All traces will be grouped under this project in LangSmith
langsmith.project.name=jmeter-ai

# LangSmith API Endpoint (optional)
# Default: https://api.smith.langchain.com
# Uncomment to use a custom endpoint (e.g., for EU region or self-hosted)
#langsmith.endpoint=https://api.smith.langchain.com
