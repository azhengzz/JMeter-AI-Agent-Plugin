##### AGENT LOOP CONFIGURATION #####

# Enable/disable the Agent Loop architecture
# When enabled, provides tool calling, memory management, and session persistence
agent.enabled=true

# Agent Loop Iteration Settings
# Note: max.tool.iterations and context.window.tokens are now configured in GLOBAL LLM DEFAULTS above

# Tool Result Truncation
# Maximum characters for tool results before truncation (default:16000)
agent.tool.result.max.chars=16000

# Injection Queue Settings
# Maximum queued injection messages per session (default: 20)
jmeter.ai.injection.queue.size=20

# Maximum injection messages processed per agent turn (default: 3)
jmeter.ai.injection.max.per.turn=3


##### WORKSPACE CONFIGURATION #####

# Workspace Path for Agent Loop
# Location for MEMORY.md, HISTORY.md, session files, skills, and bootstrap templates
# This workspace is used by: MemoryStore, SessionManager, SkillsLoader, ContextBuilder
# Default: C:\Users\{user.home}\.jmeter-ai\agent
agent.workspace.path=jmeter-agent

##### MEMORY CONFIGURATION #####

# Enable/disable memory system
# When enabled, stores long-term memory and conversation history
agent.memory.enabled=true

# Memory Consolidation Settings
# Threshold (0.0-1.0) of context window before triggering memory consolidation (default: 0.5)
agent.memory.consolidation.threshold=0.5


##### SESSION CONFIGURATION #####

# Session Timeout
# Time in milliseconds before an inactive session expires (default: 3600000 = 1 hour)
agent.session.timeout=3600000

# Maximum Sessions
# Maximum number of active sessions to maintain (default: 100)
agent.session.max.sessions=100


##### TOOL CONFIGURATION #####

# JMeter Tool Output Truncation
# Maximum characters of a single string property value before truncation
# when serializing JMeter elements (e.g., JSR223 script, HTTP body data, long URLs).
# Applies to: get_test_plan_tree, get_selected_element, query_element_properties,
# find_element, parse_jmx_file.
# Truncated values are suffixed with "...(truncated)".
# Set to a very large value (e.g., 100000000) to effectively disable truncation.
jmeter.ai.tool.max.string.length=2048

# JMeter Tools
# Enable/disable JMeter-specific tools (get_element, optimize_element, etc.)
agent.tools.jmeter.enabled=true

# File System Tools
# Enable/disable file system tools (read_file, write_file, etc.)
# WARNING: Use with caution - may pose security risks
agent.tools.filesystem.enabled=true

# Allowed directories for file system tools (comma-separated)
# If empty, defaults to user home and current working directory
# Example: C:\\Projects,D:\\Work
#agent.tools.filesystem.allowed.dirs=

# Denied directories/files for file system tools (comma-separated)
# Paths listed here will be denied even if within allowed directories.
# Supports both directories (denies everything under) and individual files.
# Example: D:\\tmp\\secrets,D:\\tmp\\config\\private.key
#agent.tools.filesystem.denied.dirs=

# Web Search Tools
# Enable/disable web search tools (web_search, web_fetch)
# Requires API keys for search services
agent.tools.websearch.enabled=true

# Web Search Provider (default: brave)
# Options: brave, tavily, jina
agent.tools.websearch.provider=brave

# Maximum search results (default: 10)
agent.tools.websearch.max.results=10

# Search timeout in seconds (default: 30)
agent.tools.websearch.timeout=30

# Web Fetch Settings
# Fetch timeout in seconds (default: 30)
agent.tools.webfetch.timeout=30

# SSRF Protection
# Enable/disable SSRF (Server-Side Request Forgery) protection
# When enabled, blocks access to private/local networks
agent.tools.web.ssrf.protection=true

# Maximum redirects to follow (default: 5)
agent.tools.web.max.redirects=5

# Enable/disable concurrent tool execution (default: false)
# When enabled, independent tool calls run in parallel
agent.tools.concurrent.enabled=false

# Fail the agent loop on tool execution error (default: false)
# When enabled, a tool error stops the entire agent run
agent.tools.fail.on.error=false

# Tool timeout in milliseconds (default: 30000)
agent.tools.timeout.ms=30000

# Exec Tool
# Enable/disable command execution tool (default: false)
# WARNING: Use with caution - allows shell command execution on the host system
agent.tools.exec.enabled=true

# Default timeout in seconds for command execution (default: 60, max: 600)
agent.tools.exec.timeout=60

# Default working directory for commands (optional)
# If set, restricts command execution to this directory and its subdirectories
#agent.tools.exec.working.dir=

# Deny patterns for dangerous commands (comma-separated regex patterns)
# If empty, uses built-in defaults (rm -rf, del /f, format, mkfs, shutdown, etc.)
#agent.tools.exec.deny.patterns=

# Additional directories to append to PATH (optional)
#agent.tools.exec.path.append=


##### CHAT UI CONFIGURATION #####

# Chat Area Font Size (default: 0 = auto, uses system font size)
# Set to a positive integer to override the font size in points.
# Examples: 14 (compact), 16 (comfortable), 18 (large), 22 (very large)
#ai.chat.font.size=0

# Show Tool Calls in Chat
# Enable/disable display of tool call information in the chat panel (default: true)
# When enabled, shows tool name, status, execution time, and result for each tool call
ai.chat.show.tool.calls=true

# Show Thinking Content in Chat
# Enable/disable display of model thinking/reasoning content in the chat panel (default: false)
# When enabled, shows the model's thinking content before tool calls and in the final response
# When disabled, <think> blocks are stripped from output
ai.chat.show.thinking=true

# Tool Result Display Max Length
# Maximum characters to display for tool results (default: 500)
# This setting is shared between:
# - Chat UI display: tool arguments and results in the chat panel
# - Internal logging: tool results stored in ToolEvent for logging
# Content longer than this will be truncated with "..." and total length indicator
ai.chat.tool.result.max.length=500


# API Keys for Search Services
# Brave API Key (optional - https://brave.com/search/api/)
agent.tools.websearch.brave.api.key=

# Tavily API Key (optional - https://tavily.com)
agent.tools.websearch.tavily.api.key=

# Jina API Key (optional - https://jina.ai)
agent.tools.websearch.jina.api.key=


##### JSR223 CONTEXT MENU CONFIGURATION #####

# Enable/disable AI refactoring entries in the JSR223 script editor's right-click menu
# When enabled, adds "Refactor Code", "Try, Catch, Finally", "Format Code" menu items
# When disabled, the JMeter default context menu is used
# Note: The menu only appears if the default provider has a valid API key configured
jmeter.ai.refactoring.enabled=true


##### LANGSMITH TRACING CONFIGURATION #####

# Enable/disable LangSmith tracing
# LangSmith provides LLM call tracing, monitoring, and evaluation
# Get your API key from https://smith.langchain.com
langsmith.enabled=false

# LangSmith API Key (required for tracing)
# Get your key from https://smith.langchain.com/settings
langsmith.api.key=

# Project Name (default: jmeter-ai)
# All traces will be grouped under this project in LangSmith
langsmith.project.name=jmeter-ai

# LangSmith API Endpoint (optional)
# Default: https://api.smith.langchain.com
# Uncomment to use a custom endpoint (e.g., for EU region or self-hosted)
langsmith.endpoint=https://api.smith.langchain.com

# Sampling rate for tracing (default: 1.0)
# Value between 0.0 and 1.0; 1.0 = trace all requests, 0.5 = trace 50%
langsmith.sample.rate=1.0


##### IPC / CLI CONFIGURATION #####

# Enable the embedded IPC HTTP server so the external CLI (jmeter-cli) can drive
# the running JMeter GUI — add/delete/update elements, or send messages to the Agent.
# Default: false (security-by-default; opt-in).
# The CLI discovers the instance via the port file written to
#   <JMETER_HOME>/bin/jmeter-agent/ipc/port-<pid>.json
jmeter.ai.ipc.enabled=false

# Bind address — MUST stay loopback. Default: 127.0.0.1.
# Wildcard values (0.0.0.0, ::, *) are refused for safety.
jmeter.ai.ipc.bind=127.0.0.1

# Listen port. 0 = auto-allocate (recommended; avoids conflicts).
# A fixed port that fails to bind will NOT silently fall back — IPC is skipped.
jmeter.ai.ipc.port=0

# Authentication token. Empty = generated randomly at each GUI start and written
# to the port file (the CLI reads it automatically). Set a fixed value only for
# controlled debugging.
jmeter.ai.ipc.token=

# Sync wait timeout (ms) for the /agent route (the CLI "agent" command).
# Default: 120000 (2 min). Increase for long agent turns.
jmeter.ai.ipc.agent.timeout.ms=120000
